version: '3.8'

# Docker Compose para desarrollo local con PostgreSQL
# Uso: docker-compose up -d

services:
  # Base de datos PostgreSQL (simula Railway en local)
  postgres:
    image: postgres:16-alpine
    container_name: botsuper_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: botsuper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Panel de administración de PostgreSQL (opcional)
  adminer:
    image: adminer:latest
    container_name: botsuper_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:

# Para usar con el bot:
# DATABASE_URL=postgresql://postgres:postgres123@localhost:5432/botsuper
